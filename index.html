<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeliuReader</title>
  <meta name="description" content="10-минутные аудиопересказы произведений русской литературы">
  <meta name="theme-color" content="#1a2a4a">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="header__titles">
      <h1>DeliuReader</h1>
      <p>10-минутный аудиопересказ книги</p>
    </div>
    <button class="icon-btn" id="settings-btn" type="button" aria-label="Настройки" title="Настройки">⚙</button>
  </header>

  <main>
    <div class="field">
      <label for="query">Автор и название</label>
      <input id="query" type="text" placeholder="Достоевский Преступление и наказание" autocomplete="off">
    </div>

    <button class="primary" id="generate-btn">Получить пересказ</button>

    <section id="result" class="result" hidden>
      <h2 id="result-title" class="result__title"></h2>
      <article id="result-text" class="result__text"></article>

    <section id="result" class="result" hidden>
      <h2 id="result-title" class="result__title"></h2>
      <article id="result-text" class="result__text"></article>

      <p id="result-disclaimer" class="result__disclaimer" hidden>
        Пересказ создан нейросетью и может содержать ошибки: неточные имена
        героев, даты или детали сюжета. Ключевые моменты сверяй с оригиналом
        произведения.
      </p>

      <div class="result__controls">
        <div class="result__buttons">
          <button class="secondary" id="speak-btn" type="button">▶ Слушать</button>
          <button class="secondary" id="stop-btn" type="button" hidden>⏹ Стоп</button>
          <button class="secondary" id="rewind-btn" type="button" hidden>⏪ −15 сек</button>
        </div>

        <label class="rate-control" aria-label="Скорость воспроизведения">
          <select id="rate-select">
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
            <option value="1.25">1.25×</option>
            <option value="1.5">1.5×</option>
            <option value="2">2×</option>
          </select>
        </label>
      </div>

    </section>
  </main>

  <!-- Модальное окно настроек -->
  <div class="modal" id="settings-modal" hidden>
    <div class="modal__overlay" id="settings-overlay"></div>
    <div class="modal__box" role="dialog" aria-modal="true" aria-labelledby="settings-heading">
      <div class="modal__head">
        <h2 id="settings-heading" class="modal__title">Настройки</h2>
        <button class="icon-btn" id="settings-close" type="button" aria-label="Закрыть">✕</button>
      </div>

      <div class="field">
        <label for="api-key">API-ключ OpenRouter</label>
        <input id="api-key" type="password" placeholder="sk-or-v1-…" autocomplete="off" spellcheck="false">
        <p class="field__hint">Ключ хранится только в этом браузере и никуда не передаётся, кроме OpenRouter.</p>
      </div>

      <div class="field field--spaced">
        <label for="model-select">Модель</label>
        <select id="model-select">
          <option value="">Загрузка списка…</option>
        </select>
        <p class="field__hint" id="model-note"></p>
      </div>

      <p class="settings-status" id="settings-status"></p>

      <button class="primary" id="settings-save" type="button">Сохранить</button>
    </div>
  </div>

  <script src="js/tts.js" defer></script>
  <script src="js/storage.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/prompts.js" defer></script>
  <script src="js/app.js" defer></script>


</body>
</html>
